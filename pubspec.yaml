name: inventory_management
description: College IT Inventory System with Deployment Analytics
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_auth: ^5.1.2
  firebase_auth_web: ^5.12.4
  firebase_core: ^3.2.0
  firebase_core_web: ^2.17.3
  firebase_database: ^11.0.4
  firebase_storage: ^12.0.3

  # Firebase dependencies (temporarily disabled for testing)
  # firebase_core: ^2.24.2
  # cloud_firestore: ^4.13.6
  # firebase_auth: ^4.15.3
  # firebase_storage: ^11.5.6

  # State management
  provider: ^6.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  get_it: ^7.6.0
  cloud_firestore: ^5.6.10

  # UI and utilities
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4

  # Charts and analytics
  fl_chart: ^0.65.0
  syncfusion_flutter_charts: ^23.2.7

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  share_plus: ^7.2.1
  url_launcher: ^6.2.1

  # QR Code functionality
  qr_flutter: ^4.1.0
  qr_code_scanner: ^1.0.1

  # PDF generation
  pdf: ^3.10.7
  printing: ^5.11.1
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  auto_route_generator: ^8.0.0
  build_runner: ^2.4.11
  flutter_gen: 5.4.0
  flutter_gen_runner: 5.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
